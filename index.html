<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="猜城 345：从卫星影像或行政版图猜中国城市。"
    />
    <title>猜城 345</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-select" id="gameSelect" aria-label="游戏选择">
      <section class="game-select-panel">
        <div class="game-select-card">
          <header class="game-select-header">
            <p class="eyebrow">Chinale 345</p>
            <h1>猜城 345</h1>
            <p>选择一个关卡开始挑战。</p>
          </header>
          <div class="game-choice-grid" id="gameChoiceGrid"></div>
        </div>
      </section>
    </main>

    <main class="shell" id="gameShell" hidden>
      <section class="map-stage" aria-label="卫星影像区域">
        <div id="map" class="map"></div>
        <div class="map-vignette" aria-hidden="true"></div>
        <div class="scanline" aria-hidden="true"></div>
        <div class="map-badge">
          <i data-lucide="satellite"></i>
          <span id="targetMode">今日挑战</span>
        </div>
        <div class="zoom-stack" id="zoomStack" aria-label="当前视野进度"></div>
      </section>

      <aside class="console" aria-label="游戏控制台">
        <header class="brand">
          <div>
            <p class="eyebrow" id="gameEyebrow">Chinale 345</p>
            <h1 id="gameTitle">天眼 345</h1>
          </div>
          <div class="brand-actions">
            <button class="icon-button" id="homeButton" type="button" title="选择游戏">
              <i data-lucide="house"></i>
            </button>
            <button class="icon-button" id="newRoundButton" type="button" title="随机开局">
              <i data-lucide="shuffle"></i>
            </button>
          </div>
        </header>

        <form class="guess-form" id="guessForm" autocomplete="off">
          <label for="cityInput">城市</label>
          <div class="input-wrap">
            <i data-lucide="search"></i>
            <input
              id="cityInput"
              type="text"
              inputmode="search"
              placeholder="输入城市名或拼音"
              aria-controls="suggestions"
              aria-expanded="false"
            />
          </div>
          <div class="suggestions" id="suggestions" role="listbox"></div>
          <div class="guess-actions">
            <button class="primary-button" type="submit" title="猜一下">
              <i data-lucide="crosshair"></i>
              <span>猜一下</span>
            </button>
            <button class="secondary-button" id="openPickerButton" type="button" title="选城市">
              <i data-lucide="layout-grid"></i>
              <span>选城市</span>
            </button>
          </div>
        </form>

        <section class="feedback" aria-live="polite">
          <div class="feedback-icon" id="feedbackIcon">
            <i data-lucide="radar"></i>
          </div>
          <div>
            <p id="feedbackTitle">正在接收卫星影像</p>
            <span id="feedbackText">观察城市肌理、河流、海岸和山地轮廓。</span>
          </div>
        </section>

        <section class="history-section">
          <div class="section-title">
            <span>猜测记录</span>
            <button class="text-button" id="giveUpButton" type="button">
              <i data-lucide="flag"></i>
              <span>揭晓</span>
            </button>
          </div>
          <div class="history" id="history"></div>
        </section>

        <div class="footer-panel">
          <div class="actions">
            <button class="secondary-button" id="resetButton" type="button" title="重开本题">
              <i data-lucide="rotate-ccw"></i>
              <span>重开本题</span>
            </button>
            <button class="secondary-button" id="shareButton" type="button" title="复制战绩" disabled>
              <i data-lucide="copy"></i>
              <span>复制战绩</span>
            </button>
          </div>

          <div class="status-grid">
            <div class="metric">
              <span>轮次</span>
              <strong id="roundLabel">1 / 6</strong>
            </div>
            <div class="metric">
              <span>题库</span>
              <strong id="cityCount">345</strong>
            </div>
            <div class="metric">
              <span>连胜</span>
              <strong id="streakCount">0</strong>
            </div>
          </div>
        </div>
      </aside>
    </main>

    <dialog class="city-picker-dialog" id="cityPickerDialog">
      <div class="city-picker-shell">
        <header class="city-picker-header">
          <div>
            <p class="eyebrow">City Board</p>
            <h2>选择城市</h2>
          </div>
          <div class="picker-head-actions">
            <span class="picker-count" id="pickerRemain">345</span>
            <button class="icon-button" id="closePickerButton" type="button" title="关闭">
              <i data-lucide="x"></i>
            </button>
          </div>
        </header>
        <div class="picker-toolbar">
          <div class="input-wrap compact-input">
            <i data-lucide="search"></i>
            <input
              id="cityFilter"
              type="text"
              inputmode="search"
              placeholder="筛选城市或省份"
            />
          </div>
          <button class="secondary-button" id="clearPickerFilterButton" type="button">
            <i data-lucide="eraser"></i>
            <span>清空</span>
          </button>
        </div>
        <div class="city-board" id="cityBoard" aria-label="城市选择列表"></div>
      </div>
    </dialog>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-shell">
        <button class="icon-button close-dialog" id="closeDialogButton" type="button" title="关闭">
          <i data-lucide="x"></i>
        </button>
        <p class="eyebrow" id="resultEyebrow">命中目标</p>
        <h2 id="resultTitle">答案是</h2>
        <p id="resultText"></p>
        <div class="result-actions">
          <button class="primary-button" id="dialogNewRoundButton" type="button">
            <i data-lucide="shuffle"></i>
            <span>下一题</span>
          </button>
          <button class="secondary-button" id="dialogShareButton" type="button">
            <i data-lucide="copy"></i>
            <span>复制战绩</span>
          </button>
        </div>
      </div>
    </dialog>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/pinyin-pro@3.28.1/dist/index.js"></script>
    <script src="assets/cities.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
